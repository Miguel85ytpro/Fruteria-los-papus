{% extends "base.html" %}
{% block content %}
<div class="card p-4">
    <h3 class="mb-4 text-uppercase">Control de Existencias</h3>
    <table class="table table-hover">
        <thead class="table-success">
            <tr>
                <th>Producto</th>
                <th>Precio (KG)</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td class="fw-bold">{{ p.nombre }}</td>
                <td>${{ p.precio_kg }}</td>
                <td>{{ p.stock }} {{ p.unidad }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
