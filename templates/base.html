<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #2e7d32 !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FRUTERÍA PAPUS</a>
        <div class="ms-auto">
            {% if session.user %}
                <span class="navbar-text text-white me-3">Bienvenido, {{ session.user }}</span>
                <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
            {% else %}
                <a href="/login" class="btn btn-outline-light btn-sm me-2">Entrar</a>
                <a href="/registro" class="btn btn-light btn-sm text-success">Registrarse</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
